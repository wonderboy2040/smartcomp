<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Offline · Smart Computers</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #fff; padding: 24px;
    }
    .card { text-align: center; max-width: 360px; }
    .icon { width: 72px; height: 72px; margin: 0 auto 24px; border-radius: 18px;
      background: linear-gradient(135deg, #34d399, #059669); display: flex; align-items: center; justify-content: center;
      box-shadow: 0 20px 40px -10px rgba(16,185,129,.4);
    }
    .icon svg { width: 36px; height: 36px; color: #fff; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { font-size: 14px; color: #94a3b8; margin: 0 0 24px; line-height: 1.5; }
    button { background: linear-gradient(135deg,#10b981,#059669); color: #fff; border: 0;
      padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:active { transform: scale(.97); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Smart Computers Panel needs an internet connection to sync with Google Sheets. Please check your network and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
