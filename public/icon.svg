<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <!-- Background with safe padding for maskable -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Monitor body -->
  <rect x="136" y="130" width="240" height="170" rx="14" fill="#0f172a" stroke="#ffffff" stroke-width="6"/>
  <!-- Screen -->
  <rect x="152" y="146" width="208" height="138" rx="6" fill="url(#screen)"/>
  <!-- Code/checkmark on screen -->
  <path d="M 180 200 L 200 220 L 180 240" fill="none" stroke="#34d399" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 230 245 L 270 195" fill="none" stroke="#34d399" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Stand -->
  <rect x="236" y="300" width="40" height="34" fill="#0f172a"/>
  <rect x="206" y="334" width="100" height="14" rx="7" fill="#0f172a"/>
  <!-- Store/Shop label dot -->
  <circle cx="362" cy="158" r="14" fill="#fbbf24" stroke="#ffffff" stroke-width="3"/>
</svg>
