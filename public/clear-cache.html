<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Clearing Cache · Smart Computers</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
      padding: 32px; max-width: 480px; width: 100%; text-align: center;
    }
    .icon {
      width: 72px; height: 72px; margin: 0 auto 20px; border-radius: 18px;
      background: linear-gradient(135deg, #10b981, #059669);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 20px 40px -10px rgba(16,185,129,.4);
    }
    .icon svg { width: 36px; height: 36px; color: #fff; }
    h1 { font-size: 22px; margin-bottom: 8px; font-weight: 700; }
    p { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 16px; }
    .status {
      background: rgba(255,255,255,0.05); border-radius: 12px;
      padding: 16px; margin: 16px 0; font-family: monospace;
      font-size: 12px; text-align: left; max-height: 200px; overflow-y: auto;
      color: #cbd5e1; white-space: pre-wrap;
    }
    .status.ok { background: rgba(16,185,129,.1); color: #6ee7b7; border: 1px solid rgba(16,185,129,.3); }
    .status.err { background: rgba(239,68,68,.1); color: #fca5a5; border: 1px solid rgba(239,68,68,.3); }
    button {
      background: linear-gradient(135deg,#10b981,#059669); color: #fff;
      border: 0; padding: 14px 28px; border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer; width: 100%;
      margin-top: 12px; transition: transform .1s;
    }
    button:active { transform: scale(.97); }
    button.secondary {
      background: rgba(255,255,255,0.1); color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .spinner {
      width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite; display: inline-block;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .note { font-size: 11px; color: #64748b; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </div>
    <h1>Clear Cache & Reload</h1>
    <p>This will remove the old service worker and cached files that are causing "This page couldn't load" errors. Click below to fix.</p>

    <div id="status" class="status hidden"></div>

    <button id="fixBtn" onclick="runFix()">
      <span id="fixBtnText">🔧 Fix Now (Clear Cache + Reload)</span>
    </button>
    <button class="secondary hidden" id="reloadBtn" onclick="location.href='/'">
      Go to App →
    </button>

    <p class="note">After clicking, this page will automatically redirect you to the app once cleanup is done.</p>
  </div>

  <script>
    function log(msg, type) {
      const el = document.getElementById('status')
      el.classList.remove('hidden', 'ok', 'err')
      if (type === 'ok') el.classList.add('ok')
      if (type === 'err') el.classList.add('err')
      el.textContent = (el.textContent ? el.textContent + '\n' : '') + msg
    }

    async function runFix() {
      const btn = document.getElementById('fixBtn')
      const btnText = document.getElementById('fixBtnText')
      btn.disabled = true
      btnText.innerHTML = '<span class="spinner"></span> Cleaning up...'

      try {
        // 1. Unregister ALL service workers
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations()
          log('Found ' + regs.length + ' service worker(s)', null)
          for (const reg of regs) {
            await reg.unregister()
            log('✓ Unregistered: ' + reg.scope, 'ok')
          }
        }

        // 2. Clear ALL caches
        if ('caches' in window) {
          const keys = await caches.keys()
          log('Found ' + keys.length + ' cache(s)', null)
          await Promise.all(keys.map(async (k) => {
            await caches.delete(k)
            log('✓ Deleted cache: ' + k, 'ok')
          }))
        }

        // 3. Clear localStorage + sessionStorage
        try {
          localStorage.clear()
          log('✓ Cleared localStorage', 'ok')
        } catch {}
        try {
          sessionStorage.clear()
          log('✓ Cleared sessionStorage', 'ok')
        } catch {}

        // 4. Clear cookies for this domain
        document.cookie.split(';').forEach(function(c) {
          document.cookie = c.replace(/^ +/, '').replace(/=.*/, '=;expires=' + new Date().toUTCString() + ';path=/')
        })
        log('✓ Cleared cookies', 'ok')

        // 5. Done
        log('\n✅ All clear! Redirecting to app in 2 seconds...', 'ok')
        btnText.textContent = '✅ Done! Redirecting...'
        setTimeout(() => {
          window.location.href = '/'
        }, 2000)
      } catch (e) {
        log('Error: ' + e.message, 'err')
        btn.disabled = false
        btnText.textContent = '🔧 Try Again'
      }
    }

    // Auto-run if URL has ?auto=1
    if (window.location.search.includes('auto=1')) {
      runFix()
    }
  </script>
</body>
</html>
