# Render deployment config - Smart Computers Panel
# No database needed! Data is stored in your Google Sheet via Apps Script.

services:
  - type: web
    name: smart-computers-panel
    runtime: node
    plan: free
    region: singapore
    branch: main
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: PORT
        value: "10000"
      # REQUIRED: Set this to your Apps Script Web App URL
      - key: APPS_SCRIPT_URL
        sync: false
      # Optional: for auto-enquiry cron security
      # - key: CRON_SECRET
      #   sync: false

# Note: No database service needed!
# All data is stored in your Google Sheet.
# Free tier works perfectly because there's no local file storage requirement.
