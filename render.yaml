# Render deployment config - Smart Computers Panel
# No database needed! Data is stored in your Google Sheet via Apps Script.

services:
  - type: web
    name: smart-computers-panel
    runtime: node
    plan: free
    region: singapore
    branch: main
    rootDir: .
    # IMPORTANT: Use npm with --include=dev for tailwindcss build deps
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      # REQUIRED: Set this in Render dashboard to your Apps Script Web App URL
      - key: APPS_SCRIPT_URL
        sync: false
      # Optional: for auto-enquiry cron security
      # - key: CRON_SECRET
      #   sync: false

# Note: No database service needed!
# All data is stored in your Google Sheet.
#
# Node version is auto-detected from .nvmrc file (set to 20.11.0)
# and package.json engines field (node: 20.x)
