# Render deployment config - Smart Computers Panel (Protected Edition v2.0)
# No database needed! Data is stored in your Google Sheet via Apps Script.
#
# DATA PROTECTION (built-in, always on):
#   - DELETE = soft-delete (rows marked deleted=true, never removed)
#   - replaceAll = permanently blocked
#   - Schema migration = data-safe (appends columns, never clears)
#
# PIN PROTECTION (optional, set APP_PIN to enable):
#   - 4-digit numeric PIN required to access the panel
#   - Set APP_PIN in Render dashboard (DO NOT commit it)

services:
  - type: web
    name: smart-computers-panel
    runtime: node
    plan: free
    region: singapore
    branch: main
    rootDir: .
    # IMPORTANT: Use npm with --include=dev for tailwindcss build deps
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      # REQUIRED: Set this in Render dashboard to your Apps Script Web App URL
      - key: APPS_SCRIPT_URL
        sync: false
      # OPTIONAL BUT RECOMMENDED: 4-digit PIN to lock the panel
      # Set to a 4-digit number like "1234" in the Render dashboard.
      # Leave empty to disable PIN protection.
      - key: APP_PIN
        sync: false
      # Optional: for auto-enquiry cron security
      # - key: CRON_SECRET
      #   sync: false

# Note: No database service needed!
# All data is stored in your Google Sheet.
#
# Node version is auto-detected from .nvmrc file (set to 20.11.0)
# and package.json engines field (node: 20.x)
